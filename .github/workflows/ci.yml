name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Integration tests (node:test, in-memory store — no DB)
        run: npm test
